
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>justmadhu.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: '#EBE9DF',
              bg: '#434C37',
              ink: '#1A1A1A',
              paper: '#F1EFE7'
            },
            fontFamily: {
              display: ['"Big Shoulders Display"', 'sans-serif'],
              inline: ['"Big Shoulders Inline Text"', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              sans: ['Inter', 'sans-serif'],
              mono: ['DM Mono', 'monospace']
            },
            animation: {
              marquee: 'marquee 50s linear infinite',
              'marquee-reverse': 'marquee-reverse 50s linear infinite',
              'marquee-fast': 'marquee 30s linear infinite',
              'marquee-reverse-fast': 'marquee-reverse 30s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              'marquee-reverse': {
                '0%': { transform: 'translateX(-50%)' },
                '100%': { transform: 'translateX(0%)' },
              },
            }
          }
        },
        plugins: [
          function({ addUtilities }) {
            addUtilities({
              '.pause-animation': {
                'animation-play-state': 'paused',
              },
              '.mask-image-edges': {
                'mask-image': 'linear-gradient(to right, transparent, black 10%, black 100%)',
                '-webkit-mask-image': 'linear-gradient(to right, transparent, black 10%, black 100%)',
              }
            })
          }
        ]
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Big+Shoulders+Inline+Text:wght@800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #434C37;
            color: #F1EFE7;
            -webkit-font-smoothing: antialiased;
        }
        ::selection {
            background: #1A1A1A;
            color: #434C37;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #434C37;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(241, 239, 231, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(241, 239, 231, 0.5);
        }
        .rams-border {
            border: 1px solid rgba(241, 239, 231, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        a {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        a:hover {
            opacity: 0.8;
        }
    </style>
